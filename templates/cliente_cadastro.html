{% extends "base.html" %}
{% block title %}Cadastro Cliente{% endblock %}
{% block content %}
<section class="auth-wrap">
    <form class="auth-card wide" method="post">
        <p class="eyebrow">Novo cliente</p>
        <h1>Criar conta no site</h1>
        <p class="section-copy">Cadastre seus dados para seguir direto para a compra e finalizar tudo com mais rapidez nas proximas visitas.</p>
        <input type="hidden" name="next" value="{{ proximo_destino }}">
        <div class="form-grid">
            <label>Nome<input type="text" name="name" required></label>
            <label>CPF<input type="text" name="cpf" required></label>
            <label>Email<input type="email" name="email"></label>
            <label>Telefone<input type="text" name="phone"></label>
            <label>Cidade<input type="text" name="city"></label>
            <label>UF<input type="text" name="state" maxlength="2"></label>
            <label>Senha<input type="password" name="password" required></label>
            <label>Confirmar senha<input type="password" name="password_confirm" required></label>
        </div>
        <div class="auth-actions">
            <button class="btn btn-primary full" type="submit">Criar conta</button>
            <a class="btn btn-secondary full" href="{{ url_for('cliente_login', next=proximo_destino) }}">Ja tenho cadastro</a>
        </div>
    </form>
</section>
{% endblock %}
