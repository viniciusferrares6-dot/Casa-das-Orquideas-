services:
  - type: web
    name: orquideas-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: ORQ_ADMIN_EMAIL
        sync: false
      - key: ORQ_ADMIN_PASSWORD
        sync: false
      - key: ORQ_PIX_KEY
        sync: false
      - key: ORQ_WEB_SECRET_KEY
        generateValue: true
      - key: PAGBANK_TOKEN
        sync: false
      - key: PAGBANK_WEBHOOK_TOKEN
        sync: false
      - key: PAGBANK_NOTIFICATION_URL
        sync: false
      - key: PAGBANK_API_BASE
        value: https://sandbox.api.pagseguro.com
      - key: WEB_APP_DATA_DIR
        value: /var/data
